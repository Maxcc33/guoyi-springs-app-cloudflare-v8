# D1 数据库绑定（消息 + CMS 内容）
[[d1_databases]]
binding = "DB"
database_name = "guoyi-messages"
database_id = "a5482efb-0aea-4f9a-bfe5-152e2b408716"

# R2 存储桶绑定（图片上传）
[[r2_buckets]]
binding = "R2"
bucket_name = "guoyi-media"

# 环境变量（在 Cloudflare Pages 控制台中设置，此处为说明）
# ADMIN_PASSWORD_HASH  - 管理员密码的 SHA-256 哈希（初始密码 admin123 的哈希见部署文档）
# ADMIN_JWT_SECRET     - JWT 签名密钥（任意随机字符串，建议 32 位以上）
# R2_PUBLIC_URL        - R2 存储桶的公开访问 URL（格式：https://pub-xxx.r2.dev）
